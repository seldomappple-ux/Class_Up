<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Class Up</title>
<style>
*, *::before, *::after { box-sizing: border-box; }
body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #fffbf2; color: #2d1f0e; min-height: 100vh; }
.shell { display: grid; grid-template-columns: 240px minmax(0, 1fr); min-height: 100vh; }
.sidebar { background: #fff8ee; border-right: 1px solid #f0d9b0; padding: 20px 10px; }
.logo { font-weight: 700; color: #c2600a; padding: 0 8px 16px; border-bottom: 1px solid #f0d9b0; font-size: 17px; }
.sidebar-label { color: #b08050; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; margin: 16px 8px 8px; }
.job-item { padding: 9px 12px; border-radius: 7px; cursor: pointer; margin-bottom: 3px; }
.job-item:hover, .job-item.active { background: #fdefd8; }
.job-title { font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #5c3a1e; }
.main { max-width: 860px; padding: 32px; }
h1 { margin: 0 0 4px; font-size: 24px; color: #2d1f0e; }
.sub { color: #8a6040; margin-bottom: 22px; font-size: 14px; }
.panel { background: #ffffff; border: 1px solid #f0d9b0; border-radius: 10px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 6px rgba(180,120,40,.07); }
.panel-title { color: #c2600a; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 14px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.full { grid-column: 1 / -1; }
label { display: block; color: #6b4226; font-size: 13px; margin-bottom: 5px; font-weight: 500; }
input, select { width: 100%; border: 1px solid #e8c98a; background: #fffdf7; color: #2d1f0e; border-radius: 7px; padding: 9px 11px; font-size: 14px; }
input:focus, select:focus { outline: none; border-color: #e07820; box-shadow: 0 0 0 3px rgba(224,120,32,.12); }
.drop { position: relative; border: 1.5px dashed #e8c98a; border-radius: 8px; padding: 22px; text-align: center; color: #b08050; font-size: 14px; }
.drop.drag, .drop:hover { border-color: #e07820; background: #fff5e6; }
.drop input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.drop-clear { display: none; position: absolute; top: 8px; right: 8px; width: 22px; height: 22px; border-radius: 50%; background: #e07820; color: #fff; border: none; font-size: 13px; line-height: 1; cursor: pointer; z-index: 2; align-items: center; justify-content: center; padding: 0; }
.drop:hover .drop-clear.visible { display: flex; }
.file-name { color: #c2600a; margin-top: 6px; font-weight: 600; font-size: 13px; }
.row { display: flex; align-items: center; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
button, .download { border: 0; border-radius: 7px; padding: 9px 18px; background: linear-gradient(135deg, #f07820, #e05010); color: white; font-weight: 600; cursor: pointer; text-decoration: none; font-size: 14px; }
button:hover { background: linear-gradient(135deg, #e06810, #c84000); }
button:disabled { opacity: .45; cursor: not-allowed; }
.download { background: transparent; border: 1px solid #e8c98a; color: #6b4226; }
.download:hover { border-color: #e07820; color: #c2600a; }
.badge { display: inline-block; border-radius: 999px; padding: 2px 8px; font-size: 11px; font-weight: 700; }
.pending { background: #f5ede0; color: #b08050; }
.running { background: #fef3c7; color: #b45309; }
.success { background: #d1fae5; color: #065f46; }
.failed { background: #fee2e2; color: #dc2626; }
.skipped { background: #f5ede0; color: #b08050; }
.hint { color: #b08050; font-size: 12px; margin-top: 5px; }
.error { color: #dc2626; font-size: 13px; }
.key-wrap { position: relative; }
.key-wrap input { padding-right: 42px; }
.key-toggle { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #b08050; cursor: pointer; padding: 0; font-size: 15px; width: auto; }
.key-toggle:hover { color: #c2600a; }

/* Progress */
.big-progress { margin-top: 4px; }
.big-progress-track { height: 28px; background: #f5ede0; border-radius: 14px; overflow: hidden; position: relative; }
.big-progress-fill { height: 100%; border-radius: 14px; background: linear-gradient(90deg, #f07820, #e05010); transition: width .6s ease; position: relative; min-width: 0; }
.big-progress-fill.indeterminate { animation: slide 1.6s linear infinite; background-size: 200% 100%; background-image: linear-gradient(90deg, #f07820 0%, #fbbf60 50%, #f07820 100%); width: 100% !important; }
@keyframes slide { 0%{background-position:100% 0} 100%{background-position:-100% 0} }
.big-progress-label { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,.25); pointer-events: none; }
.big-progress-sub { font-size: 12px; color: #b08050; margin-top: 6px; }

.preview { white-space: pre-wrap; max-height: 200px; overflow: auto; background: #fffdf7; border: 1px solid #f0d9b0; border-radius: 7px; padding: 12px; color: #6b4226; line-height: 1.6; font-family: "Cascadia Code", "Consolas", monospace; font-size: 12px; }
@media (max-width: 720px) { .shell { grid-template-columns: 1fr; } .sidebar { position: static; } .main { padding: 18px; } .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="logo">Class Up</div>
    <div class="sidebar-label">历史任务</div>
    <div id="jobList"><div class="hint" style="padding:0 8px">暂无任务</div></div>
    <div class="sidebar-label" style="margin-top:24px">清理</div>
    <div style="padding:0 8px">
      <select id="cleanupTarget" style="margin-bottom:8px;font-size:12px">
        <option value="all">全部</option>
        <option value="local">本地文件</option>
        <option value="remote">远程文件</option>
      </select>
      <button type="button" id="cleanupPreviewBtn" style="width:100%;margin-bottom:6px;font-size:12px;padding:7px 10px">预览清理</button>
      <button type="button" id="cleanupRunBtn" style="width:100%;font-size:12px;padding:7px 10px;background:linear-gradient(135deg,#dc2626,#b91c1c)">执行清理</button>
      <div id="cleanupResult" style="margin-top:8px;font-size:11px;color:#6b4226;word-break:break-all"></div>
    </div>
  </aside>
  <main class="main">
    <h1>网课转录助手</h1>
    <div class="sub">上传录屏，生成字幕和文稿。M1 阶段支持 mock 与豆包语音识别。</div>

    <section class="panel">
      <div class="panel-title">视频转音频</div>
      <form id="audioForm">
        <div class="grid">
          <div class="full">
            <label>视频文件</label>
            <div class="drop" id="audioDrop">
              <button type="button" class="drop-clear" id="audioClear">✕</button>
              <input type="file" id="audioVideoFile" accept="video/*">
              点击选择或拖入视频文件
              <div class="file-name hidden" id="audioFileName"></div>
            </div>
          </div>
          <div><label>采样率 Hz</label><input type="number" id="audioSampleRate" value="16000" min="8000" max="48000"></div>
          <div><label>声道</label><select id="audioChannels"><option value="1">1 单声道</option><option value="2">2 立体声</option></select></div>
        </div>
        <div class="row">
          <button type="submit" id="audioSubmitBtn">转换音频</button>
          <span class="hint" id="audioStatus"></span>
          <span class="error hidden" id="audioError"></span>
        </div>
        <div class="row hidden" id="audioDlRow"></div>
      </form>
    </section>

    <section class="panel">
      <div class="panel-title">新建 M1 转录任务</div>
      <form id="jobForm">
        <div class="grid">
          <div class="full">
            <label>视频文件</label>
            <div class="drop" id="fileDrop">
              <button type="button" class="drop-clear" id="fileClear">✕</button>
              <input type="file" id="videoFile" accept="video/*">
              点击选择或拖入视频文件
              <div class="file-name hidden" id="fileName"></div>
            </div>
          </div>
          <div>
            <label>API 选择</label>
            <select id="provider">
              <option value="mock">mock 测试模式</option>
              <option value="doubao">豆包语音识别</option>
              <option value="remote">自定义远程服务</option>
            </select>
            <div class="hint" id="providerHint">mock 模式无需 API Key。</div>
          </div>
          <div>
            <label>API Key</label>
            <div class="key-wrap">
              <input type="password" id="apiKey" placeholder="选择豆包时填写 API Key">
              <button type="button" class="key-toggle" id="keyToggle" tabindex="-1">👁</button>
            </div>
            <div class="hint" id="apiKeyStatus"></div>
          </div>
          <div id="modelRow" class="hidden"><label>模型名称</label><input type="text" id="model" placeholder="豆包默认 Doubao-录音文件识别2.0"></div>
          <div id="endpointRow" class="hidden"><label>Endpoint</label><input type="text" id="endpoint" placeholder="豆包默认 https://openspeech.bytedance.com"></div>
          <div><label>分段时长 秒</label><input type="number" id="segmentSeconds" value="600" min="60" max="1800"></div>
          <div><label>并发数</label><input type="number" id="concurrency" value="2" min="1" max="10"></div>
          <div class="full"><label>课程标题</label><input type="text" id="courseTitle" placeholder="默认使用文件名"></div>
        </div>
        <div class="row">
          <button type="submit" id="submitBtn">开始转录</button>
          <span class="error hidden" id="formError"></span>
        </div>
      </form>
    </section>

    <section class="panel hidden" id="progressSection">
      <div class="panel-title">M1 转录进度</div>
      <div class="big-progress">
        <div class="big-progress-track">
          <div class="big-progress-fill" id="bigFill">
            <div class="big-progress-label" id="bigLabel">等待中</div>
          </div>
        </div>
        <div class="big-progress-sub" id="bigSub"></div>
      </div>
      <div class="error hidden" id="progressError" style="margin-top:10px"></div>
    </section>

    <section class="panel hidden" id="outputSection">
      <div class="panel-title">输出预览</div>
      <label>SRT 前 20 行</label>
      <div class="preview" id="srtPreview"></div>
      <label style="margin-top:12px">文稿前 500 字</label>
      <div class="preview" id="transcriptPreview"></div>
      <div class="row" id="dlRow"></div>
    </section>
  </main>
</div>

<script>
let pollTimer = null;
let currentTaskId = null;
let savedApiKeyAvailable = false;
let apiKeySaveTimer = null;
const $ = id => document.getElementById(id);
const statusLabel = { pending: '等待中', running: '进行中', success: '完成', failed: '失败', skipped: '跳过' };

// 从 manifest 数据推导进度状态
function deriveProgress(data) {
  const m1 = data.stages?.m1?.status || 'pending';
  const media = data.media || {};
  const segs = data.segments || [];
  const outputs = data.outputs || {};
  const hasAudio = !!media.normalized_audio;
  const hasSegs = segs.length > 0;
  const total = segs.length;
  const done = segs.filter(s => s.status === 'success').length;
  const running = segs.filter(s => s.status === 'running').length;
  const allTranscribed = total > 0 && done === total;
  const hasMerged = !!(outputs.full_subtitle || outputs.full_transcript);
  const hasOutput = !!(outputs.full_subtitle && outputs.full_transcript);

  if (m1 === 'success' || hasOutput) return { pct: 100, label: '转录完成 ✓', sub: '', done: true, err: false };
  if (m1 === 'failed') return { pct: null, label: '转录失败', sub: data.stages?.m1?.error?.message || '', done: true, err: true };

  if (hasMerged) return { pct: 92, label: '生成字幕文稿...', sub: '', done: false };
  if (allTranscribed) return { pct: 80, label: '合并识别结果...', sub: '', done: false };
  if (total > 0) {
    const pct = Math.round(20 + done / total * 55);
    const sub = `语音识别：${done} / ${total} 段完成${running > 0 ? `，${running} 段进行中` : ''}`;
    return { pct, label: '语音识别中...', sub, done: false };
  }
  if (hasSegs) return { pct: 18, label: '准备识别分段...', sub: `共 ${total} 段`, done: false };
  if (hasAudio) return { pct: 12, label: '音频分段中...', sub: '', done: false };
  if (m1 === 'running') return { pct: null, label: '提取音频...', sub: '', done: false };
  return { pct: 0, label: '等待中', sub: '', done: false };
}

function renderProgress(data) {
  const { pct, label, sub, done, err } = deriveProgress(data);
  const fill = $('bigFill');
  $('bigLabel').textContent = label;
  $('bigSub').textContent = sub;
  if (err) {
    fill.style.width = '100%';
    fill.classList.remove('indeterminate');
    fill.style.background = '#dc2626';
  } else if (done) {
    fill.style.width = '100%';
    fill.classList.remove('indeterminate');
    fill.style.background = '';
  } else if (pct === null) {
    fill.style.width = '100%';
    fill.classList.add('indeterminate');
    fill.style.background = '';
  } else {
    fill.style.width = pct + '%';
    fill.classList.remove('indeterminate');
    fill.style.background = '';
  }
  const errInfo = data.stages?.m1?.error;
  if (errInfo) {
    $('progressError').textContent = errInfo.message || JSON.stringify(errInfo);
    $('progressError').classList.remove('hidden');
  } else {
    $('progressError').classList.add('hidden');
  }
}

function clearDrop(dropId, inputId, nameId, titleTargetId) {
  const nameEl = $(nameId);
  nameEl.textContent = '';
  nameEl.classList.add('hidden');
  $(dropId).querySelector('.drop-clear').classList.remove('visible');
  if (titleTargetId) $(titleTargetId).value = '';
  // reset file input
  const inp = $(inputId);
  inp.value = '';
}

function bindDrop(dropId, inputId, nameId, titleTargetId, clearId) {
  const drop = $(dropId), input = $(inputId);
  drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('drag'); });
  drop.addEventListener('dragleave', () => drop.classList.remove('drag'));
  drop.addEventListener('drop', e => {
    e.preventDefault(); drop.classList.remove('drag');
    if (e.dataTransfer.files[0]) { input.files = e.dataTransfer.files; setFileName(e.dataTransfer.files[0], nameId, titleTargetId, clearId); }
  });
  input.addEventListener('change', e => { if (e.target.files[0]) setFileName(e.target.files[0], nameId, titleTargetId, clearId); });
  if (clearId) {
    $(clearId).addEventListener('click', e => {
      e.stopPropagation();
      clearDrop(dropId, inputId, nameId, titleTargetId);
    });
  }
}

function setFileName(file, nameId, titleTargetId, clearId) {
  $(nameId).textContent = file.name;
  $(nameId).classList.remove('hidden');
  if (clearId) $(clearId).classList.add('visible');
  if (titleTargetId && !$(titleTargetId).value) $(titleTargetId).value = file.name.replace(/\.[^.]+$/, '');
}

function syncProviderDefaults() {
  const provider = $('provider').value;
  const isDoubao = provider === 'doubao';
  const isRemote = provider === 'remote';
  if (isDoubao) {
    $('providerHint').textContent = '豆包会使用 SFTP 上传分段音频，再调用录音识别。';
    $('model').value = 'Doubao-录音文件识别2.0';
    $('endpoint').value = 'https://openspeech.bytedance.com';
    $('concurrency').value = Math.min(Number($('concurrency').value || 2), 2);
  } else if (provider === 'mock') {
    $('providerHint').textContent = 'mock 模式无需 API Key。';
  } else {
    $('providerHint').textContent = '自定义服务需要后端适配器支持。';
  }
  $('modelRow').classList.toggle('hidden', !isRemote);
  $('endpointRow').classList.toggle('hidden', !isRemote);
}

async function loadOutputs(data) {
  $('outputSection').classList.remove('hidden');
  const tid = data.task_id;
  const [srt, txt] = await Promise.all([fetch(`/jobs/${tid}/file/full_subtitle`), fetch(`/jobs/${tid}/file/full_transcript`)]);
  if (srt.ok) $('srtPreview').textContent = (await srt.text()).split('\n').slice(0, 20).join('\n');
  if (txt.ok) $('transcriptPreview').textContent = (await txt.text()).slice(0, 500);
  const subtitleName = fileNameFromPath(data.outputs?.full_subtitle) || 'subtitle.srt';
  const transcriptName = fileNameFromPath(data.outputs?.full_transcript) || 'transcript.txt';
  $('dlRow').innerHTML = `<a class="download" href="/jobs/${tid}/file/full_subtitle" download="${subtitleName}">下载 SRT</a><a class="download" href="/jobs/${tid}/file/full_transcript" download="${transcriptName}">下载文稿</a>`;
}

function fileNameFromPath(path) {
  if (!path) return '';
  return String(path).split(/[\\/]/).pop();
}

async function poll() {
  if (!currentTaskId) return;
  const res = await fetch(`/jobs/${currentTaskId}`);
  if (!res.ok) return;
  const data = await res.json();
  renderProgress(data);
  if (data.status === 'success' || data.status === 'failed') {
    clearInterval(pollTimer);
    if (data.status === 'success') loadOutputs(data);
    loadJobs();
  }
}

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  poll();
  pollTimer = setInterval(poll, 2000);
}

async function loadJob(taskId) {
  currentTaskId = taskId;
  $('progressSection').classList.remove('hidden');
  $('outputSection').classList.add('hidden');
  document.querySelectorAll('.job-item').forEach(el => el.classList.toggle('active', el.dataset.id === taskId));
  startPolling();
}

async function loadJobs() {
  const jobs = await fetch('/jobs').then(r => r.json()).catch(() => []);
  const el = $('jobList');
  if (!jobs.length) { el.innerHTML = '<div class="hint" style="padding:0 8px">暂无任务</div>'; return; }
  el.innerHTML = jobs.map(j => `<div class="job-item${j.task_id === currentTaskId ? ' active' : ''}" data-id="${j.task_id}" onclick="loadJob('${j.task_id}')"><div class="job-title">${j.course_title || j.task_id}</div><span class="badge ${j.status}">${statusLabel[j.status] || j.status}</span></div>`).join('');
}

$('audioForm').addEventListener('submit', async e => {
  e.preventDefault();
  const file = $('audioVideoFile').files[0];
  if (!file) { $('audioError').textContent = '请选择视频文件'; $('audioError').classList.remove('hidden'); return; }
  $('audioSubmitBtn').disabled = true;
  $('audioError').classList.add('hidden');
  $('audioStatus').textContent = '转换中...';
  const fd = new FormData();
  fd.append('video', file);
  fd.append('sample_rate', $('audioSampleRate').value);
  fd.append('channels', $('audioChannels').value);
  try {
    const res = await fetch('/audio', { method: 'POST', body: fd });
    if (!res.ok) throw new Error((await res.json()).detail || '转换失败');
    const data = await res.json();
    $('audioStatus').textContent = '转换完成';
    $('audioDlRow').innerHTML = `<a class="download" href="/audio/${data.audio_id}/download" download="${data.filename}">下载 WAV</a>`;
    $('audioDlRow').classList.remove('hidden');
  } catch (err) {
    $('audioStatus').textContent = '';
    $('audioError').textContent = err.message;
    $('audioError').classList.remove('hidden');
  } finally {
    $('audioSubmitBtn').disabled = false;
  }
});

$('jobForm').addEventListener('submit', async e => {
  e.preventDefault();
  const file = $('videoFile').files[0];
  const provider = $('provider').value;
  if (!file) { $('formError').textContent = '请选择视频文件'; $('formError').classList.remove('hidden'); return; }
  if (provider === 'doubao' && !$('apiKey').value.trim() && !savedApiKeyAvailable) { $('formError').textContent = '选择豆包时必须填写 API Key'; $('formError').classList.remove('hidden'); return; }
  $('submitBtn').disabled = true;
  $('formError').classList.add('hidden');
  const fd = new FormData();
  fd.append('video', file);
  fd.append('api_key', $('apiKey').value.trim());
  fd.append('provider', provider);
  fd.append('endpoint', $('endpoint').value);
  fd.append('model', $('model').value);
  fd.append('course_title', $('courseTitle').value);
  fd.append('segment_seconds', $('segmentSeconds').value);
  fd.append('concurrency', $('concurrency').value);
  try {
    const res = await fetch('/jobs', { method: 'POST', body: fd });
    if (!res.ok) throw new Error((await res.json()).detail || await res.text());
    const data = await res.json();
    currentTaskId = data.task_id;
    $('progressSection').classList.remove('hidden');
    $('outputSection').classList.add('hidden');
    $('progressError').classList.add('hidden');
    startPolling();
    loadJobs();
  } catch (err) {
    $('formError').textContent = err.message;
    $('formError').classList.remove('hidden');
  } finally {
    $('submitBtn').disabled = false;
  }
});

bindDrop('audioDrop', 'audioVideoFile', 'audioFileName', null, 'audioClear');
bindDrop('fileDrop', 'videoFile', 'fileName', 'courseTitle', 'fileClear');
$('keyToggle').addEventListener('click', () => {
  const inp = $('apiKey');
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  $('keyToggle').textContent = show ? '🙈' : '👁';
});

function setApiKeyStatus(message, isError = false) {
  const el = $('apiKeyStatus');
  el.textContent = message;
  el.classList.toggle('error', isError);
  el.classList.toggle('hint', !isError);
}

async function loadSavedKeyStatus() {
  const provider = $('provider').value;
  $('apiKey').value = '';
  savedApiKeyAvailable = false;
  if (!['doubao', 'remote'].includes(provider)) {
    setApiKeyStatus('');
    return;
  }
  try {
    const res = await fetch(`/settings/api-key/${provider}`);
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    savedApiKeyAvailable = !!data.has_value;
    if (data.has_value) {
      $('apiKey').placeholder = `已保存 ${data.masked_value}，留空可直接使用`;
      setApiKeyStatus(`已保存到本机 .env，并记录到 ${data.audit_path}`);
    } else {
      $('apiKey').placeholder = provider === 'doubao' ? '选择豆包时填写 API Key' : '填写远程服务 API Key';
      setApiKeyStatus('输入后将自动保存到本机 .env，并留下掩码审计记录');
    }
  } catch (err) {
    setApiKeyStatus(`读取已保存 Key 失败：${err.message}`, true);
  }
}

async function saveKeyToServer() {
  const provider = $('provider').value;
  const key = $('apiKey').value.trim();
  if (!['doubao', 'remote'].includes(provider) || !key) return;
  try {
    const fd = new FormData();
    fd.append('provider', provider);
    fd.append('api_key', key);
    const res = await fetch('/settings/api-key', { method: 'POST', body: fd });
    if (!res.ok) {
      const detail = await res.json().catch(() => null);
      throw new Error(detail?.detail || await res.text());
    }
    const data = await res.json();
    savedApiKeyAvailable = true;
    setApiKeyStatus(`已自动保存 ${data.masked_value}，并记录到 ${data.audit_path}`);
  } catch (err) {
    setApiKeyStatus(`自动保存失败：${err.message}`, true);
  }
}

$('provider').addEventListener('change', async () => {
  syncProviderDefaults();
  await loadSavedKeyStatus();
});
$('apiKey').addEventListener('input', () => {
  setApiKeyStatus('正在等待输入完成后自动保存...');
  if (apiKeySaveTimer) clearTimeout(apiKeySaveTimer);
  apiKeySaveTimer = setTimeout(saveKeyToServer, 700);
});
$('apiKey').addEventListener('blur', saveKeyToServer);
syncProviderDefaults();
loadSavedKeyStatus();
loadJobs();

$('cleanupPreviewBtn').addEventListener('click', async () => {
  $('cleanupResult').textContent = '加载中...';
  const target = $('cleanupTarget').value;
  const res = await fetch(`/cleanup/preview?target=${target}`);
  const data = await res.json();
  const items = data.items || [];
  $('cleanupResult').textContent = items.length ? `将清理 ${items.length} 项：\n` + items.map(i => i.path || i).join('\n') : '无需清理';
});

$('cleanupRunBtn').addEventListener('click', async () => {
  if (!confirm('确认执行清理？此操作不可撤销。')) return;
  $('cleanupResult').textContent = '清理中...';
  const fd = new FormData();
  fd.append('target', $('cleanupTarget').value);
  fd.append('reason', 'manual');
  const res = await fetch('/cleanup/run', { method: 'POST', body: fd });
  const data = await res.json();
  $('cleanupResult').textContent = `已清理 ${data.deleted ?? 0} 项`;
});
</script>
</body>
</html>
