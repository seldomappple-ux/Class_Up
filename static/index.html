<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Class Up</title>
<style>
*, *::before, *::after { box-sizing: border-box; }
body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #101318; color: #e6edf3; min-height: 100vh; }
.shell { display: grid; grid-template-columns: 260px minmax(0, 1fr); min-height: 100vh; }
.sidebar { background: #171c24; border-right: 1px solid #273040; padding: 22px 12px; }
.logo { font-weight: 700; color: #8fb3ff; padding: 0 8px 18px; border-bottom: 1px solid #273040; }
.sidebar-label { color: #7d8796; font-size: 12px; margin: 18px 8px 8px; }
.job-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; margin-bottom: 4px; }
.job-item:hover, .job-item.active { background: #202735; }
.job-title { font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.main { max-width: 920px; padding: 34px; }
h1 { margin: 0 0 6px; font-size: 26px; }
.sub { color: #8b98a8; margin-bottom: 24px; }
.panel { background: #171c24; border: 1px solid #273040; border-radius: 8px; padding: 22px; margin-bottom: 18px; }
.panel-title { color: #8fb3ff; font-size: 13px; font-weight: 700; margin-bottom: 16px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.full { grid-column: 1 / -1; }
label { display: block; color: #b3bdca; font-size: 13px; margin-bottom: 6px; }
input, select { width: 100%; border: 1px solid #303a4b; background: #101318; color: #e6edf3; border-radius: 8px; padding: 10px 12px; font-size: 14px; }
input:focus, select:focus { outline: none; border-color: #8fb3ff; }
.drop { position: relative; border: 1px dashed #3b4658; border-radius: 8px; padding: 24px; text-align: center; color: #8b98a8; }
.drop.drag, .drop:hover { border-color: #8fb3ff; background: #1c2330; }
.drop input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.file-name { color: #8fb3ff; margin-top: 8px; font-weight: 600; }
.row { display: flex; align-items: center; gap: 12px; margin-top: 18px; flex-wrap: wrap; }
button, .download { border: 0; border-radius: 8px; padding: 10px 18px; background: #467ce8; color: white; font-weight: 700; cursor: pointer; text-decoration: none; }
button:disabled { opacity: .45; cursor: not-allowed; }
.download { background: transparent; border: 1px solid #303a4b; color: #b3bdca; }
.badge { display: inline-block; border-radius: 999px; padding: 2px 8px; font-size: 12px; font-weight: 700; }
.pending { background: #202735; color: #8b98a8; }
.running { background: #3a2a08; color: #f5c45f; }
.success { background: #10351f; color: #4ade80; }
.failed { background: #3b1218; color: #fb7185; }
.stage { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #273040; }
.stage:last-child { border-bottom: 0; }
.preview { white-space: pre-wrap; max-height: 210px; overflow: auto; background: #101318; border: 1px solid #273040; border-radius: 8px; padding: 12px; color: #b3bdca; line-height: 1.6; font-family: "Cascadia Code", monospace; font-size: 13px; }
.error { color: #fb7185; font-size: 13px; }
.hint { color: #7d8796; font-size: 12px; margin-top: 6px; }
.key-wrap { position: relative; }
.key-wrap input { padding-right: 44px; }
.key-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #7d8796; cursor: pointer; padding: 0; font-size: 15px; width: auto; }
.key-toggle:hover { color: #8fb3ff; }
@media (max-width: 760px) { .shell { grid-template-columns: 1fr; } .sidebar { position: static; } .main { padding: 20px; } .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="logo">Class Up</div>
    <div class="sidebar-label">历史任务</div>
    <div id="jobList"><div class="hint">暂无任务</div></div>
  </aside>
  <main class="main">
    <h1>网课转录助手</h1>
    <div class="sub">上传录屏，生成字幕和文稿。M1 阶段支持 mock 与豆包语音识别。</div>

    <section class="panel">
      <div class="panel-title">视频转音频</div>
      <form id="audioForm">
        <div class="grid">
          <div class="full">
            <label>视频文件</label>
            <div class="drop" id="audioDrop">
              <input type="file" id="audioVideoFile" accept="video/*">
              点击选择或拖入视频文件
              <div class="file-name hidden" id="audioFileName"></div>
            </div>
          </div>
          <div><label>采样率 Hz</label><input type="number" id="audioSampleRate" value="16000" min="8000" max="48000"></div>
          <div><label>声道</label><select id="audioChannels"><option value="1">1 单声道</option><option value="2">2 立体声</option></select></div>
        </div>
        <div class="row">
          <button type="submit" id="audioSubmitBtn">转换音频</button>
          <span class="hint" id="audioStatus"></span>
          <span class="error hidden" id="audioError"></span>
        </div>
        <div class="row hidden" id="audioDlRow"></div>
      </form>
    </section>

    <section class="panel">
      <div class="panel-title">新建 M1 转录任务</div>
      <form id="jobForm">
        <div class="grid">
          <div class="full">
            <label>视频文件</label>
            <div class="drop" id="fileDrop">
              <input type="file" id="videoFile" accept="video/*">
              点击选择或拖入视频文件
              <div class="file-name hidden" id="fileName"></div>
            </div>
          </div>
          <div>
            <label>API 选择</label>
            <select id="provider">
              <option value="mock">mock 测试模式</option>
              <option value="doubao">豆包语音识别</option>
              <option value="remote">自定义远程服务</option>
            </select>
            <div class="hint" id="providerHint">mock 模式无需 API Key。</div>
          </div>
          <div>
            <label>API Key</label>
            <div class="key-wrap">
              <input type="password" id="apiKey" placeholder="选择豆包时填写新版控制台 API Key">
              <button type="button" class="key-toggle" id="keyToggle" tabindex="-1">👁</button>
            </div>
          </div>
          <div id="modelRow" class="hidden"><label>模型名称</label><input type="text" id="model" placeholder="豆包默认 bigmodel"></div>
          <div id="endpointRow" class="hidden"><label>Endpoint</label><input type="text" id="endpoint" placeholder="豆包默认 https://openspeech.bytedance.com"></div>
          <div><label>分段时长 秒</label><input type="number" id="segmentSeconds" value="600" min="60" max="1800"></div>
          <div><label>并发数</label><input type="number" id="concurrency" value="2" min="1" max="10"></div>
          <div class="full"><label>课程标题</label><input type="text" id="courseTitle" placeholder="默认使用文件名"></div>
        </div>
        <div class="row">
          <button type="submit" id="submitBtn">开始转录</button>
          <span class="error hidden" id="formError"></span>
        </div>
      </form>
    </section>

    <section class="panel hidden" id="progressSection">
      <div class="panel-title">任务进度</div>
      <div class="stage"><span>M1 转录流水线</span><span class="badge pending" id="badge-m1">等待中</span></div>
      <div class="stage"><span>M2 知识点结构化</span><span class="badge pending" id="badge-m2">等待中</span></div>
      <div class="stage"><span>M3 视频切片</span><span class="badge pending" id="badge-m3">等待中</span></div>
      <div class="error hidden" id="progressError"></div>
    </section>

    <section class="panel hidden" id="outputSection">
      <div class="panel-title">输出预览</div>
      <label>SRT 前 20 行</label>
      <div class="preview" id="srtPreview"></div>
      <label style="margin-top:12px">文稿前 500 字</label>
      <div class="preview" id="transcriptPreview"></div>
      <div class="row" id="dlRow"></div>
    </section>
  </main>
</div>

<script>
let pollTimer = null;
let currentTaskId = null;
const $ = id => document.getElementById(id);
const statusLabel = { pending: '等待中', running: '进行中', success: '完成', failed: '失败', skipped: '跳过' };

function bindDrop(dropId, inputId, nameId, titleTargetId) {
  const drop = $(dropId);
  const input = $(inputId);
  drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('drag'); });
  drop.addEventListener('dragleave', () => drop.classList.remove('drag'));
  drop.addEventListener('drop', e => {
    e.preventDefault(); drop.classList.remove('drag');
    if (e.dataTransfer.files[0]) { input.files = e.dataTransfer.files; setFileName(e.dataTransfer.files[0], nameId, titleTargetId); }
  });
  input.addEventListener('change', e => { if (e.target.files[0]) setFileName(e.target.files[0], nameId, titleTargetId); });
}

function setFileName(file, nameId, titleTargetId) {
  $(nameId).textContent = file.name;
  $(nameId).classList.remove('hidden');
  if (titleTargetId && !$(titleTargetId).value) $(titleTargetId).value = file.name.replace(/\.[^.]+$/, '');
}

function syncProviderDefaults() {
  const provider = $('provider').value;
  const isDoubao = provider === 'doubao';
  const isRemote = provider === 'remote';
  if (isDoubao) {
    $('providerHint').textContent = '豆包会使用 SFTP 上传分段音频，再调用新版控制台录音识别。';
    $('model').value = 'Doubao-录音文件识别2.0';
    $('endpoint').value = 'https://openspeech.bytedance.com';
    $('concurrency').value = Math.min(Number($('concurrency').value || 2), 2);
  } else if (provider === 'mock') {
    $('providerHint').textContent = 'mock 模式无需 API Key。';
  } else {
    $('providerHint').textContent = '自定义服务需要后端适配器支持。';
  }
  $('modelRow').classList.toggle('hidden', !isRemote);
  $('endpointRow').classList.toggle('hidden', !isRemote);
}

function setBadge(stage, status) {
  const badge = $(`badge-${stage}`);
  badge.className = `badge ${status}`;
  badge.textContent = statusLabel[status] || status;
}

function updateProgress(data) {
  ['m1', 'm2', 'm3'].forEach(stage => setBadge(stage, data.stages?.[stage]?.status || 'pending'));
  const err = data.stages?.m1?.error;
  if (err) {
    $('progressError').textContent = err.message || JSON.stringify(err);
    $('progressError').classList.remove('hidden');
  }
}

async function loadOutputs(data) {
  $('outputSection').classList.remove('hidden');
  const tid = data.task_id;
  const [srt, txt] = await Promise.all([fetch(`/jobs/${tid}/file/full_subtitle`), fetch(`/jobs/${tid}/file/full_transcript`)]);
  if (srt.ok) $('srtPreview').textContent = (await srt.text()).split('\n').slice(0, 20).join('\n');
  if (txt.ok) $('transcriptPreview').textContent = (await txt.text()).slice(0, 500);
  $('dlRow').innerHTML = `<a class="download" href="/jobs/${tid}/file/full_subtitle" download="full_subtitle.srt">下载 SRT</a><a class="download" href="/jobs/${tid}/file/full_transcript" download="full_transcript.txt">下载文稿</a>`;
}

async function poll() {
  if (!currentTaskId) return;
  const res = await fetch(`/jobs/${currentTaskId}`);
  if (!res.ok) return;
  const data = await res.json();
  updateProgress(data);
  if (data.status === 'success' || data.status === 'failed') {
    clearInterval(pollTimer);
    if (data.status === 'success') loadOutputs(data);
    loadJobs();
  }
}

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  poll();
  pollTimer = setInterval(poll, 2000);
}

async function loadJob(taskId) {
  currentTaskId = taskId;
  $('progressSection').classList.remove('hidden');
  $('outputSection').classList.add('hidden');
  document.querySelectorAll('.job-item').forEach(el => el.classList.toggle('active', el.dataset.id === taskId));
  startPolling();
}

async function loadJobs() {
  const jobs = await fetch('/jobs').then(r => r.json()).catch(() => []);
  const el = $('jobList');
  if (!jobs.length) { el.innerHTML = '<div class="hint">暂无任务</div>'; return; }
  el.innerHTML = jobs.map(j => `<div class="job-item${j.task_id === currentTaskId ? ' active' : ''}" data-id="${j.task_id}" onclick="loadJob('${j.task_id}')"><div class="job-title">${j.course_title || j.task_id}</div><span class="badge ${j.status}">${statusLabel[j.status] || j.status}</span></div>`).join('');
}

$('audioForm').addEventListener('submit', async e => {
  e.preventDefault();
  const file = $('audioVideoFile').files[0];
  if (!file) { $('audioError').textContent = '请选择视频文件'; $('audioError').classList.remove('hidden'); return; }
  $('audioSubmitBtn').disabled = true;
  $('audioError').classList.add('hidden');
  $('audioStatus').textContent = '转换中...';
  const fd = new FormData();
  fd.append('video', file);
  fd.append('sample_rate', $('audioSampleRate').value);
  fd.append('channels', $('audioChannels').value);
  try {
    const res = await fetch('/audio', { method: 'POST', body: fd });
    if (!res.ok) throw new Error((await res.json()).detail || '转换失败');
    const data = await res.json();
    $('audioStatus').textContent = '转换完成';
    $('audioDlRow').innerHTML = `<a class="download" href="/audio/${data.audio_id}/download" download="${data.filename}">下载 WAV</a>`;
    $('audioDlRow').classList.remove('hidden');
  } catch (err) {
    $('audioStatus').textContent = '';
    $('audioError').textContent = err.message;
    $('audioError').classList.remove('hidden');
  } finally {
    $('audioSubmitBtn').disabled = false;
  }
});

$('jobForm').addEventListener('submit', async e => {
  e.preventDefault();
  const file = $('videoFile').files[0];
  const provider = $('provider').value;
  if (!file) { $('formError').textContent = '请选择视频文件'; $('formError').classList.remove('hidden'); return; }
  if (provider === 'doubao' && !$('apiKey').value.trim()) { $('formError').textContent = '选择豆包时必须填写 API Key'; $('formError').classList.remove('hidden'); return; }
  $('submitBtn').disabled = true;
  $('formError').classList.add('hidden');
  const fd = new FormData();
  fd.append('video', file);
  fd.append('api_key', $('apiKey').value);
  fd.append('provider', provider);
  fd.append('endpoint', $('endpoint').value);
  fd.append('model', $('model').value);
  fd.append('course_title', $('courseTitle').value);
  fd.append('segment_seconds', $('segmentSeconds').value);
  fd.append('concurrency', $('concurrency').value);
  try {
    const res = await fetch('/jobs', { method: 'POST', body: fd });
    if (!res.ok) throw new Error((await res.json()).detail || await res.text());
    const data = await res.json();
    currentTaskId = data.task_id;
    $('progressSection').classList.remove('hidden');
    $('outputSection').classList.add('hidden');
    $('progressError').classList.add('hidden');
    startPolling();
    loadJobs();
  } catch (err) {
    $('formError').textContent = err.message;
    $('formError').classList.remove('hidden');
  } finally {
    $('submitBtn').disabled = false;
  }
});

bindDrop('audioDrop', 'audioVideoFile', 'audioFileName');
bindDrop('fileDrop', 'videoFile', 'fileName', 'courseTitle');
$('provider').addEventListener('change', syncProviderDefaults);
$('keyToggle').addEventListener('click', () => {
  const inp = $('apiKey');
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  $('keyToggle').textContent = show ? '🙈' : '👁';
});

// API Key 记忆
const STORAGE_KEY = 'class_up_api_keys';
function loadSavedKeys() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    const provider = $('provider').value;
    if (saved[provider]) $('apiKey').value = saved[provider];
  } catch {}
}
function saveKey() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    const provider = $('provider').value;
    const key = $('apiKey').value.trim();
    if (key) saved[provider] = key;
    else delete saved[provider];
    localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
  } catch {}
}
$('provider').addEventListener('change', () => { $('apiKey').value = ''; loadSavedKeys(); });
$('apiKey').addEventListener('change', saveKey);
syncProviderDefaults();
loadSavedKeys();
loadJobs();
</script>
</body>
</html>
